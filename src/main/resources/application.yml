# 服务端口（可自定义，如8080/9090）
server:
  port: 8080
  servlet:
    context-path: /monitor # 接口前缀

# 数据库连接配置
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource # 连接池
    driver-class-name: com.mysql.cj.jdbc.Driver # MySQL8.x驱动（5.x是com.mysql.jdbc.Driver）
    url: jdbc:mysql://localhost:3306/monitor_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root # 你的MySQL用户名
    password: 040404 # 你的MySQL密码
    # 连接池参数（毕设可选，默认即可）
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 300000
      pool-name: MonitorHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  # 若用JPA，需加此配置（MyBatis-Plus无需）
  # jpa:
  #   hibernate:
  #     ddl-auto: update # 自动建表/更新表结构
  #   show-sql: true
  #   properties:
  #     hibernate:
  #       format_sql: true

# MyBatis-Plus配置（核心，适配你的表结构）
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true 
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl 
  global-config:
    db-config:
      id-type: AUTO 
      # table-prefix: t_ # 注释掉，因为数据库表无t_前缀
  mapper-locations: classpath:mapper/*.xml 

prometheus:
  url: http://prometheus-server:9090